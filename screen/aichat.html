<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Support Interface</title>
    <link rel="stylesheet" href="../css/newchat.css">
</head>
<body>

    <div class="page-container">
        <!-- Chat Widget Container --> 
        <div id="chat-widget"> 
            <div id="chat-header"> 
                <span>Chat Support</span> 
                <button id="close-chat">&times;</button> 
            </div> 
            
            <div id="chat-log"> 
                <!-- Messages appear here --> 
                <div class="bot-msg">Hi! Ask me about <b>costs</b>, <b>timelines</b>, or <b>services</b>.</div> 
                <h4>chat bot can make mistakes. please verify important information.</h4> 
            </div> 
            
            <div id="chat-input-area"> 
                <input type="text" id="user-input" placeholder="Type your question..." /> 
                <button id="send-btn">Send</button> 
            </div> 
        </div>
    </div>
    <script src="../data/aidata.js"></script>
</body>
</html>
